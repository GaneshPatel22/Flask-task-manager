<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Profile Builder</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="background"></div>

<div class="hero">

    <div class="glass-card">

        <h1>🤖 AI Profile Builder</h1>

        <p>
            Generate professional AI-powered profiles
            using real-world information.
        </p>

        <form
            action="/generate"
            method="POST"
            id="profileForm"
        >

            <input
                type="text"
                name="name"
                placeholder="Search any famous person..."
                required
            >

            <button type="submit">

                Generate Profile

            </button>

        </form>

        <div id="loader" class="loader hidden">

            <div class="spinner"></div>

            <p>Generating AI Profile...</p>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
