<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>{{ name }}</title>

<link rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="background"></div>

<div class="profile-container">

    <div class="profile-card">

        <h1>{{ name }}</h1>
        {% if image %}

<img
    src="{{ image }}"
    class="profile-image"
    alt="{{ name }}"
>

{% endif %}

        <div class="badge">

            AI Generated Profile

        </div>

        <div class="profile-content">

            {{ profile|safe }}

        </div>

        {% if sources %}

        <div class="sources">

            <h3>📚 Sources</h3>

            <ul>

            {% for source in sources %}

                <li>

                    <a href="{{ source }}"
                       target="_blank">

                        {{ source }}

                    </a>

                </li>

            {% endfor %}

            </ul>

        </div>

        {% endif %}

        <div class="buttons">

            <a class="btn"
               href="/download">

                📄 Download PDF

            </a>

            <a class="btn secondary"
               href="/">

                🔄 Generate Another

            </a>

        </div>

    </div>

</div>

</body>

</html>
